<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Toppers</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#050505;
    color:#fff;
}

header{
    background:#000;
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #222;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    color:#00d084;
}

.nav-icons{
    display:flex;
    gap:20px;
    font-size:24px;
}

.container{
    width:90%;
    margin:auto;
    padding:40px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:#0d0d0d;
    border:1px solid #222;
    border-radius:16px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#00d084;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:20px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:12px;
}

.validity{
    color:#00d084;
    margin-bottom:15px;
}

.price{
    font-size:24px;
    font-weight:800;
    margin-bottom:20px;
}

.old-price{
    color:#777;
    text-decoration:line-through;
    font-size:16px;
    margin-left:8px;
}

.buttons{
    display:flex;
    gap:12px;
}

.btn{
    flex:1;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    border:none;
}

.explore{
    background:#111;
    color:white;
    border:1px solid #333;
}

.enroll{
    background:#00d084;
    color:black;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:15px;
}

.hero p{
    color:#aaa;
}

footer{
    text-align:center;
    padding:30px;
    border-top:1px solid #222;
    margin-top:40px;
    color:#888;
}
</style>
</head>
<body>

<header>
    <div class="logo">Next Toppers ↗</div>
    <div class="nav-icons">
        🔍 ☰
    </div>
</header>

<section class="hero">
    <h1>Best Study Platform</h1>
    <p>Explore premium batches and courses.</p>
</section>

<div class="container">

    <div class="grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1000" alt="">
            <div class="content">
                <div class="title">NIRMAAN Class 8th</div>
                <div class="validity">✓ Validity: 365 Days</div>
                <div class="price">₹3999 <span class="old-price">₹4999</span></div>

                <div class="buttons">
                    <button class="btn explore">Explore</button>
                    <button class="btn enroll">Enroll Now</button>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1000" alt="">
            <div class="content">
                <div class="title">AARAMBH 10th Batch</div>
                <div class="validity">✓ Validity: 365 Days</div>
                <div class="price">₹2999 <span class="old-price">₹7000</span></div>

                <div class="buttons">
                    <button class="btn explore">Explore</button>
                    <button class="btn enroll">Enroll Now</button>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=1000" alt="">
            <div class="content">
                <div class="title">Commerce 12th Pro</div>
                <div class="validity">✓ Validity: 365 Days</div>
                <div class="price">₹3999 <span class="old-price">₹4999</span></div>

                <div class="buttons">
                    <button class="btn explore">Explore</button>
                    <button class="btn enroll">Enroll Now</button>
                </div>
            </div>
        </div>

    </div>

</div>

<footer>
    © 2026 Next Toppers. All Rights Reserved.
</footer>

<script>
document.querySelectorAll(".enroll").forEach(btn=>{
    btn.addEventListener("click",()=>{
        alert("Enrollment page coming soon!");
    });
});

document.querySelectorAll(".explore").forEach(btn=>{
    btn.addEventListener("click",()=>{
        alert("Course details page coming soon!");
    });
});
</script>

</body>
</html>
